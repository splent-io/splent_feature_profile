[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_profile"
version = "1.5.2"
requires-python = ">=3.13"
authors = [{ name = "DiversoLab", email = "diversolab@us.es" }]
dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "User profile feature: view and edit authenticated user profile"

[tool.splent.contract.provides]
routes     = ["/profile/edit"]
blueprints = ["profile_bp"]
models     = ["UserProfile"]
commands   = []
hooks      = ["layout.navbar.authenticated", "layout.scripts", "layout.sidebar.authenticated.items"]
services   = ["UserProfileService"]
signals    = []
translations = []
docker     = []

[tool.splent.contract.requires]
features = ["auth"]
env_vars = []
signals  = ["user-registered"]

[tool.splent.contract.extensible]
services  = ["UserProfileService"]
templates = ["profile/edit.html"]
models    = ["UserProfile"]
hooks     = []
routes    = true
